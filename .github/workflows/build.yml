name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  plugin_test:
    name: asdf plugin test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        version:
          - "3.1.1"  # sigstore.json bundle path
          - "2.4.1"  # legacy .sig path
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install cosign for verification
        uses: sigstore/cosign-installer@v3
      - name: asdf_plugin_test
        uses: asdf-vm/actions/plugin-test@v4
        with:
          command: cosign --version
          version: ${{ matrix.version }}
